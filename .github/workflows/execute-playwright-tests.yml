name: Execute Playwright Tests

# ──────────────────────────────────────────────────────────────────────────────
# Group-based execution (no test cycles).
#
# TAP triggers this workflow with only `execution_id` + per-run tuning knobs.
# The workflow then calls back to
#   GET $TAP_API_URL/api/automation-executions/$EXECUTION_ID/run-plan
# to fetch the snapshot of resolved test cases (computed when the execution
# was started from the selected Automation Test Groups) and materialises it
# as `.tap-execution.json` in the workspace root.
#
# The scaffolded `playwright.config.ts` reads `TAP_TEST_FILTER` and uses
# `testIgnore` to skip every spec file that isn't in the manifest. Test-level
# filtering (for multi-test files) is opt-in via `src/utils/tap-test-filter.ts`.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      execution_id:
        description: 'TAP Automation Execution ID'
        required: true
        type: string
      workers:
        description: 'Number of parallel workers'
        required: false
        default: '1'
        type: string
      browsers:
        description: 'Space-separated list of browsers (chromium firefox webkit)'
        required: false
        default: 'chromium'
        type: string
      timeout:
        description: 'Test timeout in milliseconds'
        required: false
        default: '30000'
        type: string
      retries:
        description: 'Number of retries for failed tests'
        required: false
        default: '0'
        type: string
      action_timeout:
        description: 'Action timeout in milliseconds (click, fill, etc.). 0 = no timeout (Playwright default)'
        required: false
        default: '0'
        type: string
      navigation_timeout:
        description: 'Navigation timeout in milliseconds (goto, etc.). 0 = no timeout (Playwright default)'
        required: false
        default: '0'
        type: string
      expect_timeout:
        description: 'Expect assertion timeout in milliseconds'
        required: false
        default: '30000'
        type: string
      global_timeout:
        description: 'Global timeout for entire test run in milliseconds (0 = no limit)'
        required: false
        default: '0'
        type: string
      db_connections:
        description: 'JSON-encoded database connections config (optional)'
        required: false
        default: ''
        type: string
      base_url:
        description: 'Base URL for the test environment'
        required: false
        default: ''
        type: string
      test_secrets:
        description: 'JSON-encoded test data secrets (passwords, API keys)'
        required: false
        default: ''
        type: string
      data_folder:
        description: 'Environment data subfolder name (e.g., development, qa)'
        required: false
        default: ''
        type: string
      branch:
        description: 'Branch to check out and run tests against (defaults to main)'
        required: false
        default: 'main'
        type: string
      tap_api_url:
        description: |
          (Local dev override) Base URL of the TAP backend the workflow should
          call back to (e.g. http://localhost:3000). When left blank the repo
          secret `TAP_API_URL` is used. Useful when running this workflow on a
          self-hosted runner that lives on the same machine as a local backend.
        required: false
        default: ''
        type: string
      tap_api_key:
        description: |
          (Local dev override) Bearer token the workflow should send when
          calling back to the TAP backend. When left blank the repo secret
          `TAP_API_KEY` is used. Must match the local backend's `TOKEN_SECRET`.
        required: false
        default: ''
        type: string

# Per-execution concurrency group.
#
# Each TAP Automation Execution gets its own group keyed on `execution_id`,
# so unrelated executions NEVER block each other — even with the same project,
# same group selection, same branch. Unlimited parallelism across executions
# is a hard requirement of the group-based model.
#
# `cancel-in-progress: false` is deliberate: if (somehow) two workflows are
# dispatched for the same execution id (e.g. accidental re-trigger), we let
# the first finish rather than killing it mid-run. TAP's own start-execution
# path guards against duplicate dispatches; this is a defence-in-depth knob.
concurrency:
  group: tap-execution-${{ inputs.execution_id }}
  cancel-in-progress: false

jobs:
  # Layer 2 of scaffold integrity enforcement (defense in depth).
  # The status-check context name is "scaffold-integrity" — this is what the
  # branch protection rule on main requires. See docs/SCAFFOLD_INTEGRITY.md §4.2.
  verify-scaffold:
    name: scaffold-integrity
    runs-on: [self-hosted, aks]
    timeout-minutes: 2
    steps:
      - name: Verify scaffold integrity
        env:
          # Local-dev overrides win when non-empty; otherwise fall back to the
          # repo-level secret. The cascade pattern
          # `inputs.x != '' && inputs.x || secrets.X` is the recommended way
          # to express "default" semantics inside a workflow expression.
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
        run: |
          PROJECT_ID="3004"
          if [ -z "$PROJECT_ID" ]; then
            echo "::warning::projectId not embedded in workflow; skipping in-workflow verify (layer 1 still enforces)"
            exit 0
          fi
          HTTP=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            "$TAP_API_URL/api/code-repositories/project/$PROJECT_ID/verify-scaffold?sha=$GITHUB_SHA")
          BODY=$(printf '%s' "$HTTP" | sed '$d')
          CODE=$(printf '%s' "$HTTP" | tail -n1)
          if [ "$CODE" = "200" ]; then
            echo "Scaffold integrity verified at $GITHUB_SHA"
            exit 0
          fi
          echo "::error::Scaffold integrity check failed (HTTP $CODE)"
          echo "$BODY"
          exit 1

  execute-tests:
    needs: verify-scaffold
    runs-on: [self-hosted, aks]
    timeout-minutes: 180

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Explicitly check out the branch the user selected in the
          # Automation Execution page. We pass the same branch as the
          # workflow_dispatch `ref` (from githubActionsService.triggerWorkflow)
          # but pinning it here makes the choice visible in the GH Actions
          # run summary and decouples "branch the workflow runs from" from
          # "branch the tests are checked out from" if we ever need to.
          ref: ${{ inputs.branch || 'main' }}

      - name: Verify Checked-Out Branch
        # Surface the actual checked-out ref + SHA + commit metadata in a
        # dedicated, always-expanded step. `actions/checkout@v4` does a
        # detached-HEAD checkout (no friendly "Switched to branch ..."
        # line) and collapses its own log group, which can make it look
        # like the wrong branch was used even when it's correct. This
        # step makes the actual checkout unambiguous in the run summary.
        run: |
          echo "Requested branch:  ${{ inputs.branch || 'main' }}"
          echo "Checked-out SHA:   $(git rev-parse HEAD)"
          echo "Short SHA:         $(git rev-parse --short HEAD)"
          echo "Symbolic ref:      $(git name-rev --name-only HEAD 2>/dev/null || echo 'detached')"
          echo "Remote tip(s) matching this SHA:"
          git branch -r --contains HEAD || true
          echo "---- HEAD commit ----"
          git log -1 --pretty=format:'%h %s%n  by %an <%ae> on %ad' --date=iso

      - name: Notify TAP - Checkout Complete
        continue-on-error: true
        env:
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
          EXECUTION_ID: ${{ inputs.execution_id }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":1,"totalSteps":7,"status":"completed","description":"Repository checked out"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Notify TAP - Node.js Ready
        continue-on-error: true
        env:
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
          EXECUTION_ID: ${{ inputs.execution_id }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":2,"totalSteps":7,"status":"completed","description":"Node.js configured"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

      - name: Fetch TAP Run Plan
        # Pull the snapshot run-plan for this execution and write it to
        # `.tap-execution.json`. The scaffolded `playwright.config.ts`
        # reads the manifest via the TAP_TEST_FILTER env var (set on the
        # Execute Playwright Tests step below) and uses `testIgnore` to
        # skip every spec file that isn't in it.
        #
        # FAIL FAST: if the manifest can't be fetched we abort. Running
        # the whole suite when the user asked for a specific group set
        # would be the wrong default — it would surface as "every test
        # passed/failed" results in TAP with no obvious cause.
        env:
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
          EXECUTION_ID: ${{ inputs.execution_id }}
        run: |
          echo "Fetching TAP run plan for execution $EXECUTION_ID..."
          HTTP=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/run-plan")
          BODY=$(printf '%s' "$HTTP" | sed '$d')
          CODE=$(printf '%s' "$HTTP" | tail -n1)
          if [ "$CODE" != "200" ]; then
            echo "::error::Failed to fetch run plan (HTTP $CODE)"
            echo "$BODY"
            exit 1
          fi

          # Extract the `manifest` array — that's the on-disk JSON shape
          # `playwright.config.ts` + `src/utils/tap-test-filter.ts` consume.
          # Includes `file`, `title`, `testCaseId` per entry.
          printf '%s' "$BODY" | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf-8'));
            const manifest = Array.isArray(data.manifest) ? data.manifest : [];
            fs.writeFileSync('.tap-execution.json', JSON.stringify(manifest));
            console.log('Wrote .tap-execution.json with ' + manifest.length + ' test(s) across ' + new Set(manifest.map(m => m.file)).size + ' file(s).');
          "

          if [ ! -s .tap-execution.json ]; then
            echo "::error::.tap-execution.json is empty after writing — refusing to run"
            exit 1
          fi

          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":3,"totalSteps":7,"status":"completed","description":"Run plan fetched"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

      - name: Configure npm registry (JFrog)
        env:
          JFROG_AUTH: ${{ secrets.JFROG_AUTH }}
        run: |
          REGISTRY="https://krogertechnology.jfrog.io/artifactory/api/npm/npm-repo/"
          cat > ~/.npmrc <<EOF
          registry=$REGISTRY
          @kroger-qa:registry=$REGISTRY
          //krogertechnology.jfrog.io/artifactory/api/npm/npm-repo/:_auth=$JFROG_AUTH
          EOF

      - name: Install Dependencies
        env:
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
          EXECUTION_ID: ${{ inputs.execution_id }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":4,"totalSteps":7,"status":"in_progress","description":"Installing dependencies"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

          npm install --no-audit
          npx playwright install ${{ inputs.browsers || 'chromium' }} --with-deps

          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":4,"totalSteps":7,"status":"completed","description":"Dependencies installed"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

      - name: Download TAP Reporter
        env:
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
        run: |
          curl -f -H "Authorization: Bearer $TAP_API_KEY" \
            -o tap-reporter.ts \
            "$TAP_API_URL/api/automation-executions/tap-reporter.ts"
          echo "TAP reporter downloaded"

          # The reporter/uploader use undici's ProxyAgent to honor HTTPS_PROXY
          # when the runner is behind the corporate egress proxy. Node's
          # built-in fetch ignores HTTPS_PROXY, so without undici the POSTs
          # back to TAP fail with 'fetch failed'.
          echo "Installing undici for proxy-aware fetch..."
          npm install --no-save --no-audit --no-fund undici

          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":5,"totalSteps":7,"status":"completed","description":"TAP tools downloaded"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

      - name: Execute Playwright Tests
        id: test-execution
        continue-on-error: true
        env:
          EXECUTION_ID: ${{ inputs.execution_id }}
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
          TAP_WORKERS: ${{ inputs.workers || '1' }}
          TAP_BROWSERS: ${{ inputs.browsers || 'chromium' }}
          TAP_TIMEOUT: ${{ inputs.timeout || '30000' }}
          TAP_RETRIES: ${{ inputs.retries || '0' }}
          TAP_ACTION_TIMEOUT: ${{ inputs.action_timeout || '0' }}
          TAP_NAVIGATION_TIMEOUT: ${{ inputs.navigation_timeout || '0' }}
          TAP_EXPECT_TIMEOUT: ${{ inputs.expect_timeout || '30000' }}
          TAP_GLOBAL_TIMEOUT: ${{ inputs.global_timeout || '0' }}
          TAP_DB_CONNECTIONS: ${{ inputs.db_connections }}
          TAP_BASE_URL: ${{ inputs.base_url }}
          TAP_TEST_SECRETS: ${{ inputs.test_secrets }}
          TAP_DATA_FOLDER: ${{ inputs.data_folder }}
          # Path to the manifest written by the "Fetch TAP Run Plan" step.
          # Consumed by:
          #   - `playwright.config.ts` (file-level `testIgnore`)
          #   - `src/utils/tap-test-filter.ts` (opt-in per-test skip helper)
          TAP_TEST_FILTER: .tap-execution.json
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":6,"totalSteps":7,"status":"in_progress","description":"Running tests"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

          # Convert space-separated browsers to JSON array for playwright config
          BROWSERS_JSON=$(echo "$TAP_BROWSERS" | tr ' ' '\n' | sed 's/.*/"&"/' | paste -sd ',' - | sed 's/^/[/' | sed 's/$/]/')
          export TAP_BROWSERS="$BROWSERS_JSON"

          echo "Starting test execution (workers: $TAP_WORKERS, browsers: $BROWSERS_JSON, manifest: $TAP_TEST_FILTER)"
          # No file-list arg here — the manifest + playwright.config.ts
          # `testIgnore` predicate together do the selection. This keeps a
          # single source of truth for "which tests run" and avoids the
          # 4096-char workflow-input limit that capped the old cycle-based
          # flow at ~250 specs.
          npx playwright test --workers=${{ inputs.workers || '1' }}
          TEST_EXIT_CODE=$?
          echo "exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          exit $TEST_EXIT_CODE

      - name: Upload Complete Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.execution_id }}
          path: |
            playwright-report/
            test-results/
            results.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-only-${{ inputs.execution_id }}
          path: test-results/**/video.webm
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-only-${{ inputs.execution_id }}
          path: test-results/**/*.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-only-${{ inputs.execution_id }}
          path: test-results/**/*.zip
          retention-days: 30
          if-no-files-found: ignore

      - name: Parse Results and Post to Backend
        if: always()
        env:
          TAP_API_URL: ${{ inputs.tap_api_url != '' && inputs.tap_api_url || secrets.TAP_API_URL }}
          TAP_API_KEY: ${{ inputs.tap_api_key != '' && inputs.tap_api_key || secrets.TAP_API_KEY }}
          EXECUTION_ID: ${{ inputs.execution_id }}
        run: |
          echo "Parsing test results..."

          if [ -f results.json ]; then
            node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('results.json', 'utf-8'));

            // Recursively walk all suites (Playwright nests specs inside sub-suites)
            let totalTests = 0;
            let passedTests = 0;
            let failedTests = 0;
            let skippedTests = 0;

            function walkSuite(suite) {
              for (const spec of (suite.specs || [])) {
                totalTests++;
                const lastTest = spec.tests?.[spec.tests.length - 1];
                const lastResult = lastTest?.results?.[lastTest.results.length - 1];
                if (lastResult) {
                  if (lastResult.status === 'passed' || lastResult.status === 'expected') passedTests++;
                  else if (lastResult.status === 'failed' || lastResult.status === 'unexpected') failedTests++;
                  else if (lastResult.status === 'skipped') skippedTests++;
                }
              }
              for (const child of (suite.suites || [])) { walkSuite(child); }
            }

            if (results.suites) { results.suites.forEach(walkSuite); }

            const status = totalTests > 0 ? 'completed' : 'failed';

            const payload = {
              status,
              totalTests,
              passedTests,
              failedTests,
              skippedTests,
              artifactsUrl: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              resultsJson: JSON.stringify(results)
            };

            console.log('Test Results:');
            console.log(JSON.stringify({ status, totalTests, passedTests, failedTests, skippedTests }, null, 2));

            fs.writeFileSync('callback-payload.json', JSON.stringify(payload));
            " || echo '{\"status\":\"failed\",\"totalTests\":0,\"passedTests\":0,\"failedTests\":0,\"skippedTests\":0}' > callback-payload.json
          else
            echo "results.json not found, creating empty results"
            echo '{"status":"failed","totalTests":0,"passedTests":0,"failedTests":0,"skippedTests":0}' > callback-payload.json
          fi

          echo "Posting results to backend..."
          HTTP_CODE=$(curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d @callback-payload.json \
            -w "%{http_code}" \
            -o callback-response.json \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/github-callback")

          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Results posted to backend successfully"
          else
            echo "Warning: Callback returned HTTP $HTTP_CODE"
          fi

          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TAP_API_KEY" \
            -d '{"step":7,"totalSteps":7,"status":"completed","description":"Execution complete"}' \
            "$TAP_API_URL/api/automation-executions/$EXECUTION_ID/workflow-step" || true

      - name: Generate Summary
        if: always()
        run: |
          echo "## Playwright Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution ID:** \`${{ inputs.execution_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ inputs.branch || 'main' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f .tap-execution.json ]; then
            MANIFEST_SUMMARY=$(node -e "
              const m = JSON.parse(require('fs').readFileSync('.tap-execution.json', 'utf-8'));
              const files = new Set(m.map(e => e.file));
              console.log('- **Manifest:** ' + m.length + ' test(s) across ' + files.size + ' file(s)');
            ")
            echo "### Run Plan" >> $GITHUB_STEP_SUMMARY
            echo "$MANIFEST_SUMMARY" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f callback-payload.json ]; then
            echo "### Test Results" >> $GITHUB_STEP_SUMMARY
            node -e "
            const results = JSON.parse(require('fs').readFileSync('callback-payload.json', 'utf-8'));
            console.log('- **Status:** ' + results.status.toUpperCase());
            console.log('- **Total Tests:** ' + results.totalTests);
            console.log('- **Passed:** ' + results.passedTests);
            console.log('- **Failed:** ' + results.failedTests);
            console.log('- **Skipped:** ' + results.skippedTests);
            " >> $GITHUB_STEP_SUMMARY
          fi
